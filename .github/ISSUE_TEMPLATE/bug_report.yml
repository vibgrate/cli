name: Bug report
description: Report something that is broken or behaving unexpectedly in the Vibgrate CLI.
title: "bug: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please search existing issues first.
        For security vulnerabilities, do **not** open an issue — see SECURITY.md.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including what you expected to happen.
      placeholder: "Running `vg impact foo` crashes with ..."
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal, deterministic steps. A small sample repo or command sequence is ideal.
      placeholder: |
        1. vg build .
        2. vg ask "..."
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: Vibgrate CLI version
      description: Output of `vg --version`.
      placeholder: "2026.625.0"
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      description: Output of `node --version`.
      placeholder: "v20.x"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 14 / Ubuntu 24.04 / Windows 11"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: Relevant command output. Run with `--verbose` if available.
      render: shell
    validations:
      required: false
