# Build, sign, attest, and publish the public Vibgrate CLI container — to GHCR
# (canonical) and Docker Hub (mirror).
#
# This pipeline used to live in the source monorepo, but
# actions/attest-build-provenance fails there ("Feature not available for
# user-owned private repositories"). It runs in the org-owned
# github.com/vibgrate/cli repo, where GitHub-native SLSA build provenance is
# available. The image is multi-arch, cosign-signed (keyless), and carries:
#   - SLSA build provenance        (GitHub-native attestation, OCI-pushed)
#   - CycloneDX + SPDX SBOMs        (generated by our OWN CLI — "we scan ourselves")
#   - OpenVEX exploitability doc    (generated by our OWN CLI)
# all attested to the immutable digest, then mirrored by digest to Docker Hub.
#
# NOTE: the proprietary HCS self-scan fact attestation that the private pipeline
# attached is intentionally NOT produced here — it needs the closed-source engine,
# which the OSS repo doesn't ship. The public image carries SLSA provenance +
# CycloneDX/SPDX SBOM + OpenVEX.
#
# Canonical: ghcr.io/vibgrate/cli   Mirror: docker.io/<DOCKERHUB_USERNAME>/cli
# (tag == @vibgrate/cli version)
#
# Triggers:
#   - push tag v*            → release that tag
#   - workflow_dispatch      → release (optional explicit tag input)
#   - push to main           → release ONLY when package.json's version changed in
#                              the push (i.e. a "Sync from monorepo" PR was merged).
#                              Ordinary doc/community merges don't bump the version,
#                              so they're skipped. This is what makes a merged sync
#                              PR ship the image with no tag to manage.
name: Docker

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to build (defaults to package.json version)"
        required: false
        default: ""

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write # push to GHCR
  id-token: write # cosign keyless signing + SLSA provenance (OIDC)
  attestations: write # actions/attest-build-provenance

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  # Decide whether this event should publish an image, and at what version. Keeps
  # the heavy publish job from running (or pushing :latest) on every commit to
  # main — only a version bump (a merged sync PR) or an explicit tag/dispatch
  # releases.
  gate:
    name: Decide release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      release: ${{ steps.decide.outputs.release }}
      version: ${{ steps.decide.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Need the parent commit so a push to main can diff package.json.
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Decide
        id: decide
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          EVENT: ${{ github.event_name }}
          BEFORE: ${{ github.event.before }}
        run: |
          set -euo pipefail
          release=false
          version=""
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            release=true
            version="$(node scripts/stamp-version.mjs --dry-run --version "${GITHUB_REF_NAME#v}")"
          elif [ "$EVENT" = "workflow_dispatch" ]; then
            release=true
            if [ -n "$INPUT_TAG" ]; then
              version="$(node scripts/stamp-version.mjs --dry-run --version "${INPUT_TAG#v}")"
            else
              version="$(node scripts/stamp-version.mjs --dry-run)"
            fi
          elif [ "$EVENT" = "push" ]; then
            # Release on a push to main ONLY when the committed version changed —
            # that is the signal that a sync/release PR landed. Publish the
            # committed version unless npm has already moved past it (manual
            # releases landed while the sync PR sat unmerged, or it merged on a
            # later day) — then recompute today's next calendar version, the SAME
            # guard release.yml applies, so the image tag always matches the npm
            # version. Both gates resolve at push time, minutes before release.yml
            # actually publishes to npm, so they recompute the same value.
            NEW="$(jq -r .version package.json)"
            OLD="$(git show "${BEFORE}:package.json" 2>/dev/null | jq -r .version || echo "")"
            if [ "$NEW" != "$OLD" ] && [ -n "$NEW" ] && [ "$NEW" != "null" ]; then
              release=true
              version="$NEW"
              LATEST="$(npm view @vibgrate/cli version 2>/dev/null || true)"
              if [ -n "$LATEST" ] && [ "$(printf '%s\n' "$LATEST" "$version" | sort -V | tail -n1)" = "$LATEST" ]; then
                version="$(node scripts/stamp-version.mjs --dry-run)"
                echo "Committed version \`${NEW}\` is not above npm latest (\`${LATEST}\`) — tagging image as \`${version}\` instead, matching the npm release." >> "$GITHUB_STEP_SUMMARY"
              fi
            fi
          fi
          echo "release=${release}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          if [ "$release" = "true" ]; then
            echo "### Image \`${IMAGE}:${version}\` — will publish" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No version change on this push — image publish skipped." >> "$GITHUB_STEP_SUMMARY"
          fi

  publish:
    name: Build, push, sign & attest
    needs: gate
    if: needs.gate.outputs.release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      version: ${{ steps.version.outputs.version }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Stamp version
        id: version
        run: |
          set -euo pipefail
          # Stamp the version the gate resolved into package.json + src/version.ts
          # so the image's `vg --version` matches the tag we push.
          VER="$(node scripts/stamp-version.mjs --version "${{ needs.gate.outputs.version }}")"
          echo "version=${VER}" >> "$GITHUB_OUTPUT"
          echo "### Image \`${IMAGE}:${VER}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (multi-arch, by digest)
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false # we attach SLSA provenance ourselves, below
          sbom: false # we attach our OWN CycloneDX/SPDX SBOMs, below
          tags: |
            ${{ env.IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE }}:latest
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            VCS_REF=${{ github.sha }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      # Sign the immutable DIGEST (never a tag) so every tag that points at it is
      # covered. Keyless: identity comes from the GitHub OIDC token.
      - name: Sign image (keyless)
        env:
          COSIGN_YES: "true"
        run: cosign sign "${IMAGE}@${{ steps.build.outputs.digest }}"

      # GitHub-native SLSA build provenance (available on org repos — the whole
      # reason this pipeline lives in the public repo), pushed to the registry as
      # an OCI attestation.
      - name: Attest build provenance (SLSA)
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      # Generate the SBOM + VEX evidence with our OWN CLI ("we scan ourselves"):
      # scan the package source, export CycloneDX + SPDX SBOMs, and emit an
      # OpenVEX baseline bound to the image digest.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build CLI
        run: pnpm build

      - name: Generate evidence (SBOMs + VEX) with our own CLI
        env:
          REF: ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          CLI="node dist/cli.js"
          $CLI scan . --format json --out image-scan.json
          $CLI sbom export --in image-scan.json --format cyclonedx --out vibgrate.cyclonedx.json
          $CLI sbom export --in image-scan.json --format spdx --out vibgrate.spdx.json
          rm -f image-scan.json
          $CLI sbom vex --product "$REF" --out openvex.json
          test -s vibgrate.cyclonedx.json && test -s vibgrate.spdx.json && test -s openvex.json

      - name: Attest SBOMs + VEX (cosign)
        env:
          COSIGN_YES: "true"
          REF: ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          cosign attest --type cyclonedx --predicate vibgrate.cyclonedx.json "$REF"
          cosign attest --type spdxjson  --predicate vibgrate.spdx.json     "$REF"
          cosign attest --type openvex   --predicate openvex.json           "$REF"

      - name: Summary
        run: |
          {
            echo "- Pushed \`${IMAGE}:${{ steps.version.outputs.version }}\` and \`:latest\`"
            echo "- Signed (cosign keyless)"
            echo "- SLSA build provenance + CycloneDX/SPDX SBOM + OpenVEX attached as attestations"
          } >> "$GITHUB_STEP_SUMMARY"

  # Independent gate: a release that cannot be verified is not a release.
  verify:
    name: Verify signature & attestations
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: read
      id-token: write
    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      # cosign / gh attestation must PULL the signature + attestation manifests
      # from GHCR to verify them. The package is private, so an anonymous token
      # request is rejected (UNAUTHORIZED). `packages: read` grants GITHUB_TOKEN
      # access, but cosign still needs the registry login to use it — mirror the
      # "Log in to GHCR" step the mirror-dockerhub job already relies on.
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify cosign signature
        run: |
          set -euo pipefail
          cosign verify "${IMAGE}@${{ needs.publish.outputs.digest }}" \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/.github/workflows/.+" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com"

      - name: Verify SBOM + VEX attestations (cosign)
        run: |
          set -euo pipefail
          REF="${IMAGE}@${{ needs.publish.outputs.digest }}"
          ID="https://github.com/${{ github.repository }}/.github/workflows/.+"
          ISSUER="https://token.actions.githubusercontent.com"
          for TYPE in cyclonedx spdxjson openvex; do
            echo "::group::verify-attestation ${TYPE}"
            cosign verify-attestation --type "${TYPE}" "$REF" \
              --certificate-identity-regexp "$ID" \
              --certificate-oidc-issuer "$ISSUER"
            echo "::endgroup::"
          done

      - name: Verify SLSA build provenance
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh attestation verify "oci://${IMAGE}@${{ needs.publish.outputs.digest }}" \
            --repo "${{ github.repository }}"

  # Keep the version pins that render on public pages in sync with the image we
  # just published: the GitHub Action's default `image-tag` (action.yml) and the
  # Helm chart's `appVersion` (Chart.yaml). Both are served from COMMITTED files,
  # so a build-time stamp alone never reaches them — we re-stamp to the published
  # version and commit them back to main.
  #
  # Loop-safe: a push made with GITHUB_TOKEN does not itself trigger workflows,
  # and the commit is marked [skip ci] as belt-and-suspenders. The change also
  # can't slip past a release gate — it touches neither package.json `version`
  # (Docker / Release gate) nor the chart `version` (Helm gate). If `main` is
  # protected against direct pushes, the step warns instead of failing the
  # release; CI's `check:pins` guard then catches the drift on the next PR.
  pin-back:
    name: Stamp version pins back to main
    needs: [publish, verify]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Stamp pins to published version
        env:
          VERSION: ${{ needs.publish.outputs.version }}
        run: node scripts/stamp-release-pins.mjs --version "$VERSION"

      - name: Commit & push if changed
        env:
          VERSION: ${{ needs.publish.outputs.version }}
        run: |
          set -euo pipefail
          if git diff --quiet -- action.yml charts/vibgrate/Chart.yaml; then
            echo "Pins already at \`${VERSION}\` — nothing to commit." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add action.yml charts/vibgrate/Chart.yaml
          git commit -m "chore(release): stamp v${VERSION} into Action image-tag & chart appVersion [skip ci]"
          if git push origin HEAD:main; then
            echo "Stamped \`action.yml\` + chart \`appVersion\` to \`${VERSION}\` on main." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning::Could not push version pins to main (branch protection?). Run \`pnpm stamp:pins\` and open a PR to pin action.yml + Chart.yaml to ${VERSION}."
            echo "> **Pins not pushed** — \`main\` may be protected. Run \`pnpm stamp:pins\` locally and open a PR." >> "$GITHUB_STEP_SUMMARY"
          fi

  # Mirror the signed digest to Docker Hub ("shadows to docker"). Skipped
  # automatically when DOCKERHUB_USERNAME is not configured, so the pipeline works
  # before the mirror is set up. Mirror by DIGEST (preserves multi-arch), then
  # re-sign + re-attest on the Docker Hub ref so `cosign verify docker.io/...` and
  # `gh attestation verify` work for images pulled from the mirror too.
  mirror-dockerhub:
    name: Mirror to Docker Hub
    needs: [publish, verify]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write # keyless cosign re-sign + native re-attest on Docker Hub
      attestations: write
      packages: read
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
    steps:
      - name: Check mirror configured
        id: cfg
        run: |
          if [ -n "${DOCKERHUB_USERNAME}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Docker Hub mirror not configured (no DOCKERHUB_USERNAME) — skipping." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Set up Docker Buildx
        if: steps.cfg.outputs.enabled == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR (read source attestations/manifests)
        if: steps.cfg.outputs.enabled == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: steps.cfg.outputs.enabled == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Mirror digest (preserves multi-arch)
        if: steps.cfg.outputs.enabled == 'true'
        id: mirror
        env:
          DEST: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/cli
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            --tag "${DEST}:${{ needs.publish.outputs.version }}" \
            --tag "${DEST}:latest" \
            "${IMAGE}@${{ needs.publish.outputs.digest }}"
          # Resolve the digest on Docker Hub so we sign/attest the immutable ref.
          digest=$(docker buildx imagetools inspect "${DEST}:${{ needs.publish.outputs.version }}" \
            --format '{{json .Manifest.Digest}}' | tr -d '"')
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"
          echo "dest=${DEST}" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        if: steps.cfg.outputs.enabled == 'true'
        uses: sigstore/cosign-installer@v3

      # Re-sign on Docker Hub so `cosign verify docker.io/...` works — signatures
      # live at the registry digest, not GHCR.
      - name: Re-sign on Docker Hub (keyless)
        if: steps.cfg.outputs.enabled == 'true'
        env:
          COSIGN_YES: "true"
          DEST_REF: ${{ steps.mirror.outputs.dest }}@${{ steps.mirror.outputs.digest }}
        run: cosign sign "${DEST_REF}"

      # Re-push the SBOM + VEX attestations: pull each predicate from GHCR and
      # re-attest it against the Docker Hub digest.
      - name: Re-attest SBOMs + VEX on Docker Hub
        if: steps.cfg.outputs.enabled == 'true'
        env:
          COSIGN_YES: "true"
          DEST_REF: ${{ steps.mirror.outputs.dest }}@${{ steps.mirror.outputs.digest }}
          SRC_REF: ${{ env.IMAGE }}@${{ needs.publish.outputs.digest }}
        run: |
          set -euo pipefail
          for TYPE in cyclonedx spdxjson openvex; do
            cosign verify-attestation --type "${TYPE}" "${SRC_REF}" \
              --certificate-identity-regexp "https://github.com/${{ github.repository }}/.github/workflows/.+" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              | jq -r '.payload | @base64d | fromjson | .predicate' > "predicate-${TYPE}.json"
            cosign attest --type "${TYPE}" --predicate "predicate-${TYPE}.json" "${DEST_REF}"
          done

      # Re-attest GitHub-native SLSA build provenance against the Docker Hub digest
      # so `gh attestation verify oci://docker.io/...` works for mirror pulls too.
      - name: Re-attest build provenance (Docker Hub)
        if: steps.cfg.outputs.enabled == 'true'
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ steps.mirror.outputs.dest }}
          subject-digest: ${{ steps.mirror.outputs.digest }}
          push-to-registry: true

      - name: Summary (mirror)
        if: steps.cfg.outputs.enabled == 'true'
        run: |
          {
            echo "- Mirror: \`${{ steps.mirror.outputs.dest }}:${{ needs.publish.outputs.version }}\` and \`:latest\`"
            echo "- Re-signed (cosign keyless) + SLSA provenance & CycloneDX/SPDX SBOM + OpenVEX re-attested on Docker Hub."
          } >> "$GITHUB_STEP_SUMMARY"
