# Build and publish the public Vibgrate CLI image to GHCR.
#
# Runs in the org-owned github.com/vibgrate/cli repo, so GitHub-native build
# provenance + SBOM attestation are available (they are NOT on user-owned private
# repos). The image is multi-arch, cosign-signed (keyless), and carries SLSA
# provenance and a CycloneDX SBOM as attestations.
#
# Image: ghcr.io/vibgrate/cli  (tag == @vibgrate/cli version)
name: Docker

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to build (defaults to package.json version)"
        required: false
        default: ""

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write # push to GHCR
  id-token: write # cosign keyless signing (OIDC)
  attestations: write # actions/attest-build-provenance + attest-sbom

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  publish:
    name: Build, push & attest
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      version: ${{ steps.version.outputs.version }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          set -euo pipefail
          IN="${{ github.event.inputs.tag }}"
          if [ -n "$IN" ]; then
            VER="${IN#v}"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VER="${GITHUB_REF_NAME#v}"
          else
            VER="$(node -p "require('./package.json').version")"
          fi
          echo "version=${VER}" >> "$GITHUB_OUTPUT"
          echo "### Image \`${IMAGE}:${VER}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (multi-arch)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false # we attach SLSA provenance ourselves, below
          sbom: false # we attach a CycloneDX SBOM ourselves, below
          tags: |
            ${{ env.IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE }}:latest
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            VCS_REF=${{ github.sha }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless)
        env:
          COSIGN_YES: "true"
        run: cosign sign "${IMAGE}@${{ steps.build.outputs.digest }}"

      # GitHub-native SLSA build provenance (available on org repos), pushed to
      # the registry as an OCI attestation.
      - name: Attest build provenance (SLSA)
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      # Generate a CycloneDX SBOM for the image and attest it natively.
      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
          format: cyclonedx-json
          output-file: sbom.cdx.json

      - name: Attest SBOM
        uses: actions/attest-sbom@v4
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          sbom-path: sbom.cdx.json
          push-to-registry: true

      - name: Summary
        run: |
          {
            echo "- Pushed \`${IMAGE}:${{ steps.version.outputs.version }}\` and \`:latest\`"
            echo "- Signed (cosign keyless)"
            echo "- SLSA build provenance + CycloneDX SBOM attached as attestations"
          } >> "$GITHUB_STEP_SUMMARY"

  verify:
    name: Verify signature & attestations
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: read
      id-token: write
    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Verify cosign signature
        run: |
          set -euo pipefail
          cosign verify "${IMAGE}@${{ needs.publish.outputs.digest }}" \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/.github/workflows/.+" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com"

      - name: Verify SLSA build provenance + SBOM attestation
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh attestation verify "oci://${IMAGE}@${{ needs.publish.outputs.digest }}" \
            --repo "${{ github.repository }}"
