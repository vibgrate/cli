# Package, sign, and publish the Vibgrate Helm chart to GHCR (OCI), and refresh
# the Artifact Hub repository metadata.
#
# Runs in the org-owned github.com/vibgrate/cli repo so the chart publishes to the
# canonical ghcr.io/vibgrate/charts/vibgrate (not the private monorepo's owner).
# Provenance is a gate: the chart is cosign-signed (keyless) and the final step
# re-verifies the signature. The chart version is semver (read from Chart.yaml —
# the source of truth) and iterates independently of the CLI's calendar version.
#
# Triggers:
#   - push to main           → publish ONLY when charts/vibgrate/Chart.yaml's
#                              `version` changed in the push (a merged chart-bump /
#                              "Sync from monorepo" PR). Other merges are skipped,
#                              so no tag to manage and no re-publish on every commit.
#   - workflow_dispatch      → manual run (with a dry-run option)
name: Helm

on:
  push:
    branches: [main]
    paths:
      - "charts/**"
      - ".github/workflows/helm.yml"
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Dry run (lint + package + template, skip push & sign)"
        required: false
        default: false
        type: boolean

concurrency:
  group: helm-${{ github.ref }}
  cancel-in-progress: false

env:
  CHART_DIR: charts/vibgrate
  OCI_REPO: oci://ghcr.io/${{ github.repository_owner }}/charts
  CHART_REF: ghcr.io/${{ github.repository_owner }}/charts/vibgrate

jobs:
  # Decide whether this event should publish, and skip a no-op republish on an
  # ordinary push to main. A manual run always publishes (subject to dry-run).
  gate:
    name: Decide release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      release: ${{ steps.decide.outputs.release }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Decide
        id: decide
        env:
          EVENT: ${{ github.event_name }}
          BEFORE: ${{ github.event.before }}
        run: |
          set -euo pipefail
          release=false
          if [ "$EVENT" = "workflow_dispatch" ]; then
            release=true
          elif [ "$EVENT" = "push" ]; then
            # Publish only when the chart version changed in this push.
            NEW="$(grep -E '^version:' "${CHART_DIR}/Chart.yaml" | awk '{print $2}' | tr -d '"')"
            OLD="$(git show "${BEFORE}:${CHART_DIR}/Chart.yaml" 2>/dev/null | grep -E '^version:' | awk '{print $2}' | tr -d '"' || echo "")"
            if [ "$NEW" != "$OLD" ] && [ -n "$NEW" ]; then release=true; fi
          fi
          echo "release=${release}" >> "$GITHUB_OUTPUT"
          if [ "$release" = "true" ]; then
            echo "### Helm chart — will publish" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No chart version change on this push — Helm publish skipped." >> "$GITHUB_STEP_SUMMARY"
          fi

  publish:
    name: Package, push & sign
    needs: gate
    if: needs.gate.outputs.release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write # tag the release
      packages: write # push to GHCR
      id-token: write # keyless cosign
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Read chart version
        id: chart
        run: |
          set -euo pipefail
          ver=$(grep -E '^version:' "${CHART_DIR}/Chart.yaml" | awk '{print $2}' | tr -d '"')
          echo "version=${ver}" >> "$GITHUB_OUTPUT"
          echo "### Chart version: \`${ver}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Lint
        run: helm lint "${CHART_DIR}" --strict -f "${CHART_DIR}/ci/test-values.yaml"

      - name: Render (template smoke test)
        run: helm template vibgrate "${CHART_DIR}" -f "${CHART_DIR}/ci/test-values.yaml" > /dev/null

      - name: Package
        run: helm package "${CHART_DIR}" --destination .

      - name: Log in to GHCR
        if: github.event_name != 'workflow_dispatch' || inputs.dry-run == false
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push to OCI registry
        id: push
        if: github.event_name != 'workflow_dispatch' || inputs.dry-run == false
        run: |
          set -euo pipefail
          helm push "vibgrate-${{ steps.chart.outputs.version }}.tgz" "${OCI_REPO}" 2> push.log
          cat push.log
          digest=$(grep -oE 'sha256:[0-9a-f]{64}' push.log | head -1)
          if [ -z "${digest}" ]; then echo "::error::could not determine pushed digest"; exit 1; fi
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        if: github.event_name != 'workflow_dispatch' || inputs.dry-run == false
        uses: sigstore/cosign-installer@v3

      - name: Sign chart (keyless)
        if: github.event_name != 'workflow_dispatch' || inputs.dry-run == false
        env:
          COSIGN_YES: "true"
        run: cosign sign "${CHART_REF}@${{ steps.push.outputs.digest }}"

      - name: Verify signature (gate)
        if: github.event_name != 'workflow_dispatch' || inputs.dry-run == false
        run: |
          cosign verify "${CHART_REF}@${{ steps.push.outputs.digest }}" \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/.github/workflows/.+" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com"

      # Publish Artifact Hub repository metadata as an OCI artifact so the
      # verified-publisher badge can be granted. No-op if the file still has an
      # empty repositoryID (i.e. the repo hasn't been registered on Artifact Hub yet).
      - name: Push Artifact Hub metadata
        if: github.event_name != 'workflow_dispatch' || inputs.dry-run == false
        run: |
          set -euo pipefail
          if grep -qE '^repositoryID:\s*""\s*$' charts/artifacthub-repo.yml; then
            echo "Artifact Hub repositoryID not set yet — skipping metadata push." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          oras push "${CHART_REF}:artifacthub.io" \
            --config /dev/null:application/vnd.cncf.artifacthub.config.v1+yaml \
            charts/artifacthub-repo.yml:application/vnd.cncf.artifacthub.repository-metadata.layer.v1.yaml

      - name: Tag release
        if: github.event_name != 'workflow_dispatch' || inputs.dry-run == false
        run: |
          TAG="vibgrate-helm/v${{ steps.chart.outputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists — skipping." >> "$GITHUB_STEP_SUMMARY"
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Summary
        run: |
          {
            echo "### Helm chart"
            if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry-run }}" = "true" ]; then
              echo "> **Dry run** — chart linted & packaged, not pushed."
            else
              echo "- Chart: \`${CHART_REF}:${{ steps.chart.outputs.version }}\`"
              echo "- Digest: \`${{ steps.push.outputs.digest }}\`"
              echo "- Signed (cosign keyless) and verified."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
