# Publishes @vibgrate/cli to npm with provenance — on a v* tag, or manually.
#
# REQUIRED SECRET: NPM_TOKEN must be set as a repository secret (an npm
# automation/granular access token with publish rights for @vibgrate/cli).
# Without it, `npm publish` will fail. Provenance additionally requires the
# `id-token: write` permission below — do not remove it.
#
# Manual runs: Actions → Release → Run workflow. The published version is the
# one in package.json. Use the "dry-run" option to validate the build + npm
# pack without publishing.
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Build and pack only — do not publish to npm"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write # required for npm provenance

jobs:
  publish:
    name: Build and publish to npm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Verify checks
        run: |
          pnpm typecheck
          pnpm lint
          pnpm test

      - name: Show release target
        run: |
          VER=$(node -p "require('./package.json').version")
          echo "### Releasing \`@vibgrate/cli@${VER}\`" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "- Trigger: manual (workflow_dispatch)" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Trigger: tag \`${GITHUB_REF_NAME}\`" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Publish dry run (pack only)
        if: github.event_name == 'workflow_dispatch' && inputs.dry-run == true
        run: |
          npm publish --access public --provenance --dry-run
          echo "> **Dry run** — nothing was published." >> "$GITHUB_STEP_SUMMARY"

      - name: Publish to npm (public, with provenance)
        if: github.event_name != 'workflow_dispatch' || inputs.dry-run == false
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
