# Publishes @vibgrate/cli to npm with provenance — on a merged sync PR, a v* tag,
# or manually.
#
# REQUIRED SECRET: NPM_TOKEN must be set as a repository secret (an npm
# automation/granular access token with publish rights for @vibgrate/cli).
# Without it, `npm publish` will fail. Provenance additionally requires the
# `id-token: write` permission below — do not remove it.
#
# Versioning is the calendar scheme YYYY.MDD.N:
#   - tag push           → version comes from the tag
#   - manual run         → next counter for today, computed from npm
#                          (scripts/stamp-version.mjs), so it auto-increments
#   - push to main       → publish the committed package.json version, but ONLY
#                          when it changed in the push (a merged "Sync from
#                          monorepo" PR). Ordinary doc/community merges don't bump
#                          the version, so they're skipped. This is what makes a
#                          merged sync PR publish to npm with no tag to manage.
#                          If npm has already moved past the committed version
#                          (manual releases landed while the sync PR sat unmerged,
#                          or it merged on a later day), the next calendar version
#                          is recomputed from npm instead — npm refuses to tag a
#                          lower version as `latest`, and the merged code is the
#                          newest code, so it must ship as a fresh higher version.
# The resolved version is stamped into package.json AND src/version.ts before the
# build.
#
# After a successful (non-dry-run) publish on the push-to-main or manual path, the
# resolved version is tagged as `v<version>` (e.g. v2026.701.3) and a GitHub Release
# is cut for it. The tag is pushed with GITHUB_TOKEN, which does NOT start new
# workflow runs, so it can't loop back through the v* trigger into another publish.
#
# Manual runs: Actions → Release → Run workflow. Use the "dry-run" option to
# validate the build + npm pack without publishing.
name: Release

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Build and pack only — do not publish to npm"
        required: false
        default: false
        type: boolean

permissions:
  contents: write # push the v<version> tag + create the GitHub Release after publish
  id-token: write # required for npm provenance

jobs:
  # Decide whether this event should publish to npm, and at what version. Keeps
  # the publish job from running on every commit to main — only a version bump (a
  # merged sync PR) or an explicit tag/dispatch releases.
  gate:
    name: Decide release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      release: ${{ steps.decide.outputs.release }}
      version: ${{ steps.decide.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Need the parent commit so a push to main can diff package.json.
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24

      - name: Decide
        id: decide
        env:
          EVENT: ${{ github.event_name }}
          BEFORE: ${{ github.event.before }}
        run: |
          set -euo pipefail
          release=false
          version=""
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            release=true
            version="$(node scripts/stamp-version.mjs --dry-run --version "${GITHUB_REF_NAME#v}")"
          elif [ "$EVENT" = "workflow_dispatch" ]; then
            # Manual run: compute the next calendar version from npm.
            release=true
            version="$(node scripts/stamp-version.mjs --dry-run)"
          elif [ "$EVENT" = "push" ]; then
            # Release on a push to main ONLY when the committed version changed —
            # the signal that a sync/release PR landed. Publish that version as
            # long as it can still take the `latest` dist-tag. If the registry
            # has moved past it (a manual release ran while the sync PR sat
            # unmerged, or the PR merged on a later day), recompute today's next
            # calendar version from npm — publishing the stale, lower version
            # would be rejected ("previously published version ... is higher"),
            # and the merged code is the newest code, so it ships as a fresh
            # higher version instead.
            NEW="$(jq -r .version package.json)"
            OLD="$(git show "${BEFORE}:package.json" 2>/dev/null | jq -r .version || echo "")"
            if [ "$NEW" != "$OLD" ] && [ -n "$NEW" ] && [ "$NEW" != "null" ]; then
              release=true
              version="$NEW"
              LATEST="$(npm view @vibgrate/cli version 2>/dev/null || true)"
              if [ -n "$LATEST" ] && [ "$(printf '%s\n' "$LATEST" "$version" | sort -V | tail -n1)" = "$LATEST" ]; then
                version="$(node scripts/stamp-version.mjs --dry-run)"
                echo "Committed version \`${NEW}\` is not above npm latest (\`${LATEST}\`) — releasing as \`${version}\` instead." >> "$GITHUB_STEP_SUMMARY"
              fi
            fi
          fi
          echo "release=${release}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          if [ "$release" = "true" ]; then
            echo "### Releasing \`@vibgrate/cli@${version}\`" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No version change on this push — npm publish skipped." >> "$GITHUB_STEP_SUMMARY"
          fi

  publish:
    name: Build and publish to npm
    needs: gate
    if: needs.gate.outputs.release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Stamp the resolved version BEFORE building, so src/version.ts (embedded
      # for `vg --version`) and package.json agree with what gets published.
      - name: Stamp version
        id: version
        run: |
          set -euo pipefail
          VER=$(node scripts/stamp-version.mjs --version "${{ needs.gate.outputs.version }}")
          echo "version=${VER}" >> "$GITHUB_OUTPUT"
          echo "### Releasing \`@vibgrate/cli@${VER}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Build
        run: pnpm build

      - name: Verify checks
        run: |
          pnpm typecheck
          pnpm lint
          pnpm test

      - name: Publish dry run (pack only)
        if: github.event_name == 'workflow_dispatch' && inputs.dry-run == true
        run: |
          npm publish --access public --provenance --dry-run
          echo "> **Dry run** — nothing was published." >> "$GITHUB_STEP_SUMMARY"

      - name: Publish to npm (public, with provenance)
        if: github.event_name != 'workflow_dispatch' || inputs.dry-run == false
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Tag the published version and cut a GitHub Release. Runs only after a real
      # publish (not dry-run) and only on the push-to-main / manual-dispatch paths,
      # not when this workflow was itself triggered by a v* tag (the tag already
      # exists then). The tag is pushed with GITHUB_TOKEN, and GitHub does NOT start
      # new workflow runs for GITHUB_TOKEN pushes — so despite the v* tag triggers on
      # this workflow and docker.yml, creating v<version> here cannot loop back into
      # another publish. Both the tag and the release are idempotent (skip if they
      # already exist) so a manual re-run is safe.
      - name: Tag release and create GitHub Release
        if: github.ref_type != 'tag' && (github.event_name != 'workflow_dispatch' || inputs.dry-run == false)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          TAG="v${VERSION}"
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null \
            || git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag \`${TAG}\` already exists — skipping tag creation." >> "$GITHUB_STEP_SUMMARY"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "${TAG}" -m "@vibgrate/cli ${VERSION}"
            git push origin "${TAG}"
            echo "Pushed tag \`${TAG}\`." >> "$GITHUB_STEP_SUMMARY"
          fi
          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "GitHub Release \`${TAG}\` already exists — skipping." >> "$GITHUB_STEP_SUMMARY"
          else
            # The sync from the monorepo ships curated notes for each release
            # (changeset summary + benchmark numbers + link to the full report)
            # as releases/v<version>.md — use them as the release body when
            # present, fall back to auto-generated notes when not.
            NOTES_FILE="releases/v${VERSION}.md"
            if [ -f "$NOTES_FILE" ]; then
              gh release create "${TAG}" --title "${TAG}" --notes-file "$NOTES_FILE"
              echo "Created GitHub Release \`${TAG}\` from \`${NOTES_FILE}\`." >> "$GITHUB_STEP_SUMMARY"
            else
              gh release create "${TAG}" --title "${TAG}" --generate-notes
              echo "Created GitHub Release \`${TAG}\` (auto-generated notes — no \`${NOTES_FILE}\` in the tree)." >> "$GITHUB_STEP_SUMMARY"
            fi
          fi
