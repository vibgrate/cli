# Publishes @vibgrate/cli to npm with provenance — on a v* tag, or manually.
#
# REQUIRED SECRET: NPM_TOKEN must be set as a repository secret (an npm
# automation/granular access token with publish rights for @vibgrate/cli).
# Without it, `npm publish` will fail. Provenance additionally requires the
# `id-token: write` permission below — do not remove it.
#
# Versioning is the calendar scheme YYYY.MDD.N. On a tag push the version comes
# from the tag; on a manual run it is computed as the next counter for today
# from what is already on npm (scripts/stamp-version.mjs) — so every publish
# auto-increments instead of re-using the committed placeholder. The resolved
# version is stamped into package.json AND src/version.ts before the build.
#
# Manual runs: Actions → Release → Run workflow. Use the "dry-run" option to
# validate the build + npm pack without publishing.
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Build and pack only — do not publish to npm"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write # required for npm provenance

jobs:
  publish:
    name: Build and publish to npm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Stamp the real version BEFORE building, so src/version.ts (embedded for
      # `vg --version`) and package.json agree with what gets published.
      - name: Resolve & stamp version
        id: version
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "push" ]; then
            VER=$(node scripts/stamp-version.mjs --version "${GITHUB_REF_NAME#v}")
          else
            VER=$(node scripts/stamp-version.mjs)
          fi
          echo "version=${VER}" >> "$GITHUB_OUTPUT"
          echo "### Releasing \`@vibgrate/cli@${VER}\`" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "- Trigger: manual (computed next calendar version)" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Trigger: tag \`${GITHUB_REF_NAME}\`" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Build
        run: pnpm build

      - name: Verify checks
        run: |
          pnpm typecheck
          pnpm lint
          pnpm test

      - name: Publish dry run (pack only)
        if: github.event_name == 'workflow_dispatch' && inputs.dry-run == true
        run: |
          npm publish --access public --provenance --dry-run
          echo "> **Dry run** — nothing was published." >> "$GITHUB_STEP_SUMMARY"

      - name: Publish to npm (public, with provenance)
        if: github.event_name != 'workflow_dispatch' || inputs.dry-run == false
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
